const PER=50;let page=1;const pager=document.getElementById('pager');
function render(){
 const term=q.value.trim().toLowerCase();
 let rows=DATA.map((r,i)=>({...r,rank:i+1}));
 if(term)rows=rows.filter(r=>r.verb.toLowerCase().includes(term)||r.forms.toLowerCase().includes(term));
 const k=sort.k;
 rows.sort((a,b)=>{let x=a[k],y=b[k];if(typeof x==='string'){x=x.toLowerCase();y=y.toLowerCase();return x<y?-sort.dir:x>y?sort.dir:0}return (x-y)*sort.dir});
 const pages=Math.max(1,Math.ceil(rows.length/PER));if(page>pages)page=pages;
 const view=rows.slice((page-1)*PER,page*PER);
